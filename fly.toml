# Имя приложения глобально уникально на Fly.io. Если деплой ругнётся — смените строку app.
#
# Состояние диалогов бота хранится в памяти JVM. При 2+ машинах webhook может попадать на разные
# инстансы — сессия «ломается». Держите одну машину:
#   fly scale count 1 -a interviewpartner-bot
app = "interviewpartner-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  TELEGRAM_BOT_WEBHOOK_BASE_URL = "https://interviewpartner-bot.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  # Webhook + health: без входящего HTTP Fly может остановить прокси; держим машину включённой.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
