# Имя приложения глобально уникально на Fly.io. Если деплой ругнётся — смените строку app.
app = "interviewpartner-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  # Long polling: машина не должна засыпать от «тишины» HTTP.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
