services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewpartner-postgres
    environment:
      POSTGRES_DB: interviewpartner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - interviewpartner_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interviewpartner"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    container_name: interviewpartner-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  interviewpartner_pgdata:

