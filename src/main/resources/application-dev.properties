spring.datasource.url=jdbc:h2:mem:interviewpartner;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

server.port=8085

spring.liquibase.change-log=file:src/main/resources/db/changelog/db.changelog-master.xml
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# при необходимости: video-meeting.jitsi-base-url=https://meet.jit.si

telegram.bot.webhook.enabled=false
