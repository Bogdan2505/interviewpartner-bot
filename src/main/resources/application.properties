spring.application.name=InterviewPartner Bot

spring.profiles.active=dev

telegram.bot.token=
telegram.bot.username=

# Jitsi Meet: базовый URL (публичный meet.jit.si или свой инстанс без завершающего /)
video-meeting.jitsi-base-url=https://meet.jit.si

# Файловый лог (подробнее: logback-spring.xml). Размер ≈ объёму ~30k строк текста лога.
logging.file.name=logs/interview-bot.log
logging.logback.rollingpolicy.file-name-pattern=logs/interview-bot.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
