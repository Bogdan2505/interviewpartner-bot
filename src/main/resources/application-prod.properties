server.port=8080
server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/interviewpartner}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Jitsi: при своём сервере задайте video-meeting.jitsi-base-url

# Telegram webhook (Telegram шлёт POST на {base-url}/telegram/webhook). Секрет только через env / fly secrets.
telegram.bot.webhook.enabled=true
telegram.bot.webhook.base-url=${TELEGRAM_BOT_WEBHOOK_BASE_URL:https://interviewpartner-bot.fly.dev}
telegram.bot.webhook.secret=${TELEGRAM_BOT_WEBHOOK_SECRET:}
