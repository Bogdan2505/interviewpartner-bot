# При необходимости: interviewpartner.time-zone=Europe/Moscow (или env INTERVIEWPARTNER_TIME_ZONE)

server.port=8080
server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/interviewpartner}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:300000}

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Jitsi: при своём сервере задайте video-meeting.jitsi-base-url

# Telegram webhook (Telegram шлёт POST на {base-url}/telegram/webhook). Секрет только через env / fly secrets.
telegram.bot.webhook.enabled=true
telegram.bot.webhook.base-url=${TELEGRAM_BOT_WEBHOOK_BASE_URL:https://interviewpartner-bot.fly.dev}
telegram.bot.webhook.secret=${TELEGRAM_BOT_WEBHOOK_SECRET:}

# Adaptive scheduler backoff (empty ticks): base 60s -> 120s -> 300s
interviewpartner.notification.reminder-backoff.step1-rate=${NOTIFICATION_REMINDER_BACKOFF_STEP1_RATE:PT120S}
interviewpartner.notification.reminder-backoff.step2-rate=${NOTIFICATION_REMINDER_BACKOFF_STEP2_RATE:PT300S}
interviewpartner.notification.reminder-backoff.step1-empty-streak=${NOTIFICATION_REMINDER_BACKOFF_STEP1_EMPTY_STREAK:3}
interviewpartner.notification.reminder-backoff.step2-empty-streak=${NOTIFICATION_REMINDER_BACKOFF_STEP2_EMPTY_STREAK:8}
interviewpartner.notification.broadcast-backoff.step1-rate=${NOTIFICATION_BROADCAST_BACKOFF_STEP1_RATE:PT120S}
interviewpartner.notification.broadcast-backoff.step2-rate=${NOTIFICATION_BROADCAST_BACKOFF_STEP2_RATE:PT300S}
interviewpartner.notification.broadcast-backoff.step1-empty-streak=${NOTIFICATION_BROADCAST_BACKOFF_STEP1_EMPTY_STREAK:3}
interviewpartner.notification.broadcast-backoff.step2-empty-streak=${NOTIFICATION_BROADCAST_BACKOFF_STEP2_EMPTY_STREAK:8}
